<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #667eea;
            font-size: 28px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 24px;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .download-btn {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(39, 174, 96, 0.6);
        }

        .logout-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(231, 76, 60, 0.6);
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card h2 {
            margin-bottom: 15px;
            color: #667eea;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card p {
            font-size: 42px;
            font-weight: 700;
            color: #333;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 18px;
            text-align: left;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px 18px;
            border-bottom: 1px solid #eee;
        }

        tbody tr {
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f9f9f9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 16px;
        }

        .error-message {
            background: #fadbd8;
            color: #c0392b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c0392b;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .header-buttons {
                width: 100%;
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="header">
        <h1>Admin Dashboard</h1>
        <div class="header-buttons">
            <button class="download-btn" onclick="downloadReport()">Download Report</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div id="errorContainer"></div>

    <div class="cards">
        <div class="card">
            <h2>Total Volunteers</h2>
            <p id="totalVolunteers">0</p>
        </div>
    </div>

    <div class="table-container">
        <div id="tableContent">
            <div class="loading">Loading volunteers...</div>
        </div>
    </div>
</div>

<script>
// Check if user is logged in
if(localStorage.getItem("isAdminLoggedIn") !== "true"){
    window.location.href = "login.html";
}

async function loadVolunteers(){
    try {
        const response = await fetch("http://localhost:5000/volunteers");
        
        if (!response.ok) {
            throw new Error('Failed to load volunteers');
        }

        const volunteers = await response.json();

        document.getElementById("totalVolunteers").innerText = volunteers.length;

        let tableHTML = `
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>City</th>
                        <th>Skills</th>
                        <th>Availability</th>
                        <th>Status</th>
                        <th>Registered At</th>
                    </tr>
                </thead>
                <tbody>
        `;

        if (volunteers.length === 0) {
            tableHTML += `
                <tr>
                    <td colspan="9" style="text-align: center; padding: 40px; color: #999;">
                        No volunteers registered yet
                    </td>
                </tr>
            `;
        } else {
            volunteers.forEach((v) => {
                tableHTML += `
                    <tr>
                        <td>${v.id}</td>
                        <td>${v.name}</td>
                        <td>${v.email}</td>
                        <td>${v.phone}</td>
                        <td>${v.city}</td>
                        <td>${v.skills}</td>
                        <td>${v.availability}</td>
                        <td>${v.status}</td>
                        <td>${new Date(v.created_at).toLocaleString()}</td>
                    </tr>
                `;
            });
        }

        tableHTML += `
                </tbody>
            </table>
        `;

        document.getElementById("tableContent").innerHTML = tableHTML;

    } catch(error) {
        console.error("Error:", error);
        document.getElementById("tableContent").innerHTML = `
            <div class="loading">
                Cannot connect to server! Make sure backend is running (npm start)
            </div>
        `;
    }
}

async function downloadReport(){
    try {
        const response = await fetch("http://localhost:5000/export-csv");
        
        if (!response.ok) {
            throw new Error('Failed to export CSV');
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "volunteer_registrations.csv";
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);
    } catch(error) {
        console.error("Error:", error);
        alert("Failed to download report. Make sure the backend is running.");
    }
}

function logout(){
    localStorage.removeItem("isAdminLoggedIn");
    localStorage.removeItem("adminId");
    window.location.href = "login.html";
}

// Load volunteers on page load
loadVolunteers();

// Refresh every 10 seconds
setInterval(loadVolunteers, 10000);
</script>

</body>
</html>
